name: Publish dsqusss on Push

on:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          
      - name: Set semantic version for this push
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          pyproject = Path("pyproject.toml")
          content = pyproject.read_text(encoding="utf-8")

          if not re.search(r'^version\s*=\s*"([^"]+)"', content, flags=re.MULTILINE):
              raise SystemExit("Could not find [project].version in pyproject.toml")

          run_number = int(os.environ["RUN_NUMBER"])
          if run_number < 1:
              raise SystemExit("RUN_NUMBER must be >= 1")

          # Base-100 carry strategy:
          # 1..99      -> 0.0.1 .. 0.0.99
          # 100..199   -> 0.1.0 .. 0.1.99
          # 10000      -> 1.0.0
          major = run_number // 10000
          minor = (run_number // 100) % 100
          patch = run_number % 100
          version = f"{major}.{minor}.{patch}"

          updated = re.sub(
              r'^version\s*=\s*"[^"]+"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(updated, encoding="utf-8")
          print(f"Package version set to: {version}")
          PY

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*
