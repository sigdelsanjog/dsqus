name: Publish dsqusss on Push

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Set unique dev version for this push
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          pyproject = Path("pyproject.toml")
          content = pyproject.read_text(encoding="utf-8")

          match = re.search(r'^version\s*=\s*"([^"]+)"', content, flags=re.MULTILINE)
          if not match:
              raise SystemExit("Could not find [project].version in pyproject.toml")

          base_version = match.group(1).split(".dev", 1)[0]
          dev_version = f"{base_version}.dev{__import__('os').environ['RUN_NUMBER']}"
          updated = re.sub(
              r'^version\s*=\s*"[^"]+"',
              f'version = "{dev_version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(updated, encoding="utf-8")
          print(f"Package version set to: {dev_version}")
          PY

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*
